services:
  backend:
    build:
      context: .
    image: browne-backend
    network_mode: host
    # env_file passes values literally (no ${} interpolation) — safe for the
    # SMTP password which contains a '$'.
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      DB_PATH: /data/browne.sqlite3
      STATIC_ROOT: /app/staticfiles
      GEOIP_DB: /data/geoip/GeoLite2-City.mmdb
      PORT: "5030"
    volumes:
      - ./data:/data
      - /home/ab/GeoLite2-City_20250103:/data/geoip:ro
    restart: unless-stopped

  agent:
    build:
      context: ../browne-agent
    image: browne-agent
    network_mode: host
    env_file:
      - .env
    environment:
      AGENT_PORT: "5031"
      DB_PATH: /data/browne.sqlite3
    volumes:
      - ./data:/data
    depends_on:
      - backend
    restart: unless-stopped
