# brownebioactives.com - single-page app serving two sections from one build:
#   /            → division chooser (landing)
#   /cosmetics/* → Cosmetic & Pharmaceutical Ingredients site
#   /research/*  → Research Reagents (RUO) site
#
# Client-side routing (React Router) handles every path under those prefixes; the
# `try_files ... /index.html` fallback below is what makes deep links such as
# /research/products/ab-p24-001 work on direct load / refresh.
#
# NOTE: HTTPS (listen 443 + ssl_certificate) on the live host is managed by Certbot
# in /etc/nginx/sites-available/brownebioactives.com - keep that as the TLS source of
# truth. This file documents the app's routing/serving requirements.

server {
    listen 80;
    server_name brownebioactives.com www.brownebioactives.com;

    # Document root - where the built React app files are located
    root /var/www/brownebioactives.com;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Handle static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle React Router (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Custom error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}